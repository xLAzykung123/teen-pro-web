<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TeenPro — ระบบบริหารชั้นเรียนครูมัธยมศึกษา</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   TeenPro — Professional Blue Theme (มัธยมศึกษา)
═══════════════════════════════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary: #1e40af;        /* Royal Blue - professional */
  --primary-dark: #1e3a8a;
  --primary-light: #3b82f6;
  --accent: #f59e0b;         /* Amber - warm highlight */
  --success: #16a34a;
  --warning: #eab308;
  --danger: #dc2626;
  --info: #0ea5e9;
  --purple: #9333ea;
  --bg: #f1f5f9;
  --bg-white: #ffffff;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #cbd5e1;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --radius: 10px;
  --radius-sm: 6px;
  /* Level colors - ม.1-6 */
  --m1: #3b82f6;   /* blue */
  --m2: #06b6d4;   /* cyan */
  --m3: #10b981;   /* green */
  --m4: #f59e0b;   /* amber */
  --m5: #ec4899;   /* pink */
  --m6: #9333ea;   /* purple */
}

body {
  font-family: 'Sarabun','Kanit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 14px;
}

/* ─── Layout ─── */
#app {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

#sidebar {
  background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary) 100%);
  color: #fff;
  overflow-y: auto;
  max-height: 100vh;
  position: sticky;
  top: 0;
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,.15);
  text-align: center;
}

#sidebar-header .logo {
  font-family:'Kanit',sans-serif;
  font-size:22px;
  font-weight:800;
  color:#fff;
}

#sidebar-header .subtitle {
  font-size: 11px;
  opacity: .8;
  margin-top: 2px;
}

.menu-group {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.08);
}

.menu-group-title {
  padding: 8px 16px 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: rgba(255,255,255,.6);
}

.menu-item {
  padding: 8px 16px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  border-left: 3px solid transparent;
}

.menu-item:hover {
  background: rgba(255,255,255,.1);
  border-left-color: var(--accent);
}

.menu-item.active {
  background: rgba(255,255,255,.15);
  border-left-color: var(--accent);
  font-weight: 600;
}

.menu-item .icon { font-size: 18px; width: 24px; text-align: center; }
.menu-item .label { flex: 1; }
.menu-item .sub { font-size: 10px; opacity: .7; display: block; margin-top: 1px; }

/* ─── Main Content ─── */
#main {
  padding: 16px;
  overflow-x: hidden;
}

#topbar {
  background: #fff;
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }

.term-pill {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

#content { animation: fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes pop { 0%{transform:scale(.5);opacity:0} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(1);opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ─── Cards ─── */
.card {
  background: #fff;
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  border: 1px solid var(--border);
}

.card-title {
  font-family: 'Kanit', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary);
}
.card-header .card-title { border: none; padding: 0; margin: 0; }

/* ─── Grids ─── */
.grid { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
.grid-6 { grid-template-columns: repeat(6, 1fr); }
@media (max-width: 900px) {
  .grid-3, .grid-4, .grid-5, .grid-6 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4, .grid-5, .grid-6 { grid-template-columns: 1fr; }
}

/* ─── Buttons ─── */
.btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
  text-decoration: none;
}
.btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
.btn:active { transform: translateY(0); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-lg { padding: 11px 20px; font-size: 14px; }
.btn-secondary { background: var(--text-muted); }
.btn-secondary:hover { background: #475569; }
.btn-success { background: var(--success); }
.btn-success:hover { background: #15803d; }
.btn-warning { background: var(--warning); color: #1e293b; }
.btn-warning:hover { background: #ca8a04; }
.btn-danger { background: var(--danger); }
.btn-danger:hover { background: #b91c1c; }
.btn-info { background: var(--info); }
.btn-info:hover { background: #0284c7; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: #f1f5f9; }

/* ─── Forms ─── */
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text);
}
.form-label .req { color: var(--danger); }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  background: #fff;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(30,64,175,.1);
}
.form-textarea { min-height: 60px; resize: vertical; }

/* ─── Tables ─── */
.table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  background: #fff;
}
table.data thead th {
  background: var(--primary);
  color: #fff;
  padding: 8px 6px;
  font-weight: 600;
  text-align: center;
  font-size: 12px;
  white-space: nowrap;
}
table.data tbody td {
  padding: 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
table.data tbody tr.odd { background: #f8fafc; }
table.data tbody tr:hover { background: #dbeafe; }
table.data tfoot td {
  background: #f1f5f9;
  font-weight: 600;
  padding: 8px 6px;
}

/* ─── Stats ─── */
.stat-box {
  background: #fff;
  padding: 14px;
  border-radius: var(--radius);
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.stat-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 800; color: var(--primary); line-height: 1.2; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ─── Badges & Chips ─── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  background: #f1f5f9;
  color: var(--text);
}
.badge-primary { background: #dbeafe; color: var(--primary); }
.badge-success { background: #dcfce7; color: var(--success); }
.badge-warning { background: #fef9c3; color: #854d0e; }
.badge-danger  { background: #fee2e2; color: var(--danger); }
.badge-info    { background: #cffafe; color: #0e7490; }
.badge-purple  { background: #f3e8ff; color: var(--purple); }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 11px;
  background: #fff;
}

/* ─── Modal ─── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 16px;
}
.modal {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-height: 90vh;
  width: 500px;
  max-width: 95vw;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.modal.modal-lg { width: 720px; }
.modal.modal-xl { width: 960px; }
.modal-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--primary);
  color: #fff;
}
.modal-title { font-family: 'Kanit', sans-serif; font-weight: 700; font-size: 15px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #fff; }
.modal-body { padding: 16px; overflow-y: auto; flex: 1; }
.modal-actions {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
  background: #f8fafc;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 14px;
  overflow-x: auto;
  gap: 2px;
}
.tab {
  padding: 8px 14px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  font-size: 13px;
  transition: all .15s;
  font-weight: 500;
}
.tab:hover { background: #f1f5f9; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* ─── Toast ─── */
#toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: #fff;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  border-left: 4px solid var(--info);
  font-size: 13px;
  animation: slideInRight .3s;
  min-width: 220px;
}
.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
@keyframes slideInRight { from{transform:translateX(100%)} to{transform:none} }

/* ─── Empty State ─── */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
}
.empty-icon { font-size: 56px; margin-bottom: 10px; display: block; }
.empty-text { font-size: 15px; margin-bottom: 10px; }

/* ─── Utilities ─── */
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.flex-center { display: flex; justify-content: center; align-items: center; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; }
.text-xs { font-size: 11px; } .text-sm { font-size: 12px; } .text-lg { font-size: 16px; }
.text-muted { color: var(--text-muted); }
.text-center { text-align: center; } .text-right { text-align: right; }
.fw-bold { font-weight: 700; }
.w-full { width: 100%; }

/* ─── Confidential Marker (ดล.) ─── */
.confidential {
  background: #fee2e2;
  border: 2px solid var(--danger);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  color: var(--danger);
  text-align: center;
  margin-bottom: 12px;
}

/* ─── Print Styles ─── */
@media print {
  #sidebar, #topbar, .no-print { display: none !important; }
  #app { grid-template-columns: 1fr; }
  #main { padding: 0; }
}
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo">🎓 TeenPro</div>
      <div class="subtitle">ระบบบริหารชั้นเรียนครูมัธยม</div>
    </div>
    <nav id="sidebar-menu"></nav>
  </aside>

  <main id="main">
    <div id="topbar">
      <div class="topbar-left">
        <strong id="page-title">แดชบอร์ด</strong>
      </div>
      <div class="topbar-right">
        <select id="level-select" class="form-select" style="width:auto;padding:6px 10px" onchange="setLevel(this.value)">
          <option value="ม.1">ม.1</option>
          <option value="ม.2">ม.2</option>
          <option value="ม.3">ม.3</option>
          <option value="ม.4">ม.4</option>
          <option value="ม.5">ม.5</option>
          <option value="ม.6">ม.6</option>
        </select>
        <select id="room-select" class="form-select" style="width:auto;padding:6px 10px" onchange="setRoom(this.value)" title="ห้องเรียน">
          <!-- Populated by renderRoomSelect() -->
        </select>
        <button class="btn btn-sm btn-ghost" style="padding:4px 8px;font-size:12px" onclick="manageRooms()" title="จัดการห้องเรียน">➕</button>
        <select id="term-select" class="form-select" style="width:auto;padding:6px 10px" onchange="setTerm(parseInt(this.value))">
          <option value="1">ภาค 1</option>
          <option value="2">ภาค 2</option>
        </select>
        <span class="term-pill" id="today-pill">📅 วันนี้</span>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="toast-container"></div>
<div id="modal-root"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   TeenPro — Application Script (ครูมัธยม)

/* ─── Helpers ─── */
function uid() { return 't' + Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function todayKey() { return new Date().toISOString().slice(0,10); }
function thisWeekNum() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - start) / 86400000);
  return Math.ceil((days + start.getDay() + 1) / 7);
}
function formatDate(key) {
  if (!key) return '—';
  const [y, m, d] = key.split('-');
  return `${parseInt(d)} ${TH_MONTHS[parseInt(m)-1]} ${parseInt(y)+543}`;
}
function formatDateShort(key) {
  if (!key) return '—';
  const [y, m, d] = key.split('-');
  return `${parseInt(d)}/${parseInt(m)}/${(parseInt(y)+543)%100}`;
}
function calcAge(birthdate) {
  if (!birthdate) return 0;
  const b = new Date(birthdate);
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  if (now.getMonth() < b.getMonth() || (now.getMonth()===b.getMonth() && now.getDate()<b.getDate())) age--;
  return age;
}

function getCurStudents() {
  return APP.students
    .filter(s => s.level === APP.curLevel && String(s.room||'1') === String(APP.curRoom||'1'))
    .sort((a,b) => (a.number||999) - (b.number||999));
}

// คนในระดับเดียวกันทุกห้อง (บางเมนูต้องใช้)
function getLevelStudents() {
  return APP.students
    .filter(s => s.level === APP.curLevel)
    .sort((a,b) => (a.number||999) - (b.number||999));
}

function getStudentById(id) {
  return APP.students.find(s => s.id === id);
}

function scoreToGrade(score) {
  for (const g of GRADES) if (score >= g.min) return g;
  return GRADES[GRADES.length-1];
}

/* ─── Storage ─── */
function saveData() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(APP));
    return true;
  } catch(e) {
    console.error('Save failed', e);
    if (e.name === 'QuotaExceededError' || /quota/i.test(e.message||'')) {
      toast('⚠️ พื้นที่เก็บข้อมูลเต็ม — ลองลบภาพนักเรียนบางคน หรือลดคุณภาพภาพ', 'danger', 5000);
    } else {
      toast('บันทึกไม่สำเร็จ: ' + (e.message||''), 'danger', 4000);
    }
    return false;
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    Object.assign(APP, data);
  } catch(e) { console.error('Load failed', e); }
}

let _editingPhotoDraft = {};  // {id: photoDataUrl} - pending uploads during edit

/**
 * Compress uploaded image to small JPEG data URL
 * Default: 220x280 px @ 0.82 quality → ~15-25 KB per image
 * Portrait ratio (5:4) ideal for student photo
 */
async function compressImage(file, maxW=220, maxH=280, quality=0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        try { resolve(canvas.toDataURL('image/jpeg', quality)); }
        catch(err) { reject(err); }
      };
      img.onerror = () => reject(new Error('โหลดรูปไม่ได้'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('อ่านไฟล์ไม่ได้'));
    reader.readAsDataURL(file);
  });
}

/**
 * Return HTML for student avatar: real photo OR colored gradient fallback with initial
 * @param {Object} student - student object
 * @param {number} size - width in px (height auto 1.25x for portrait)
 * @param {Object} opts - {round: true for circle, shadow: true}
 */
function studentAvatar(student, size=40, opts={}) {
  if (!student) return '';
  const h = Math.round(size * 1.25);
  const radius = opts.round ? '50%' : '6px';
  const shadow = opts.shadow ? 'box-shadow:var(--shadow)' : '';
  if (student.photo) {
    return `<img src="${student.photo}" style="width:${size}px;height:${h}px;object-fit:cover;border-radius:${radius};border:2px solid #e5e7eb;${shadow};background:#fff" alt="${student.fname||''}" loading="lazy">`;
  }
  // Fallback: colored gradient circle with initial
  const initial = (student.nickname || student.fname || '?').charAt(0);
  const palette = ['#ef4444','#f59e0b','#10b981','#3b82f6','#9333ea','#ec4899','#06b6d4','#84cc16','#6366f1','#f97316','#14b8a6','#d946ef'];
  const c = palette[(student.number || 0) % 12];
  return `<div style="width:${size}px;height:${h}px;background:linear-gradient(135deg,${c},${c}cc);color:#fff;border-radius:${radius};display:inline-flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.5)}px;font-weight:bold;border:2px solid ${c};${shadow};vertical-align:middle">${initial}</div>`;
}

/**
 * Photo upload handler called from <input type=file onchange>
 * Stores to _editingPhotoDraft (applied at save) or directly if studentId exists
 */
async function handlePhotoUpload(studentId, evt) {
  const file = evt.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    toast('กรุณาเลือกไฟล์ภาพ (JPG/PNG/HEIC)', 'warning');
    evt.target.value = '';
    return;
  }
  if (file.size > 15 * 1024 * 1024) {
    toast('ขนาดไฟล์เกิน 15 MB — กรุณาเลือกรูปเล็กกว่านี้', 'warning', 4000);
    evt.target.value = '';
    return;
  }
  try {
    toast('⏳ กำลังประมวลผลภาพ...', 'info', 1500);
    const dataUrl = await compressImage(file);
    _editingPhotoDraft[studentId] = dataUrl;
    // Refresh preview in modal
    const preview = document.getElementById('photo-preview-' + studentId);
    if (preview) {
      preview.innerHTML = `<img src="${dataUrl}" style="width:120px;height:150px;object-fit:cover;border-radius:8px;border:3px solid #3b82f6;box-shadow:var(--shadow)">`;
    }
    const info = document.getElementById('photo-info-' + studentId);
    if (info) {
      const sizeKB = Math.round(dataUrl.length * 0.75 / 1024);
      info.innerHTML = `✅ พร้อมบันทึก · ${sizeKB} KB · <button class="btn btn-sm btn-danger" style="padding:2px 8px" onclick="clearPendingPhoto('${studentId}')">ยกเลิก</button>`;
    }
    evt.target.value = '';
    toast('✅ ประมวลผลภาพเสร็จ · กดบันทึกเพื่อยืนยัน', 'success');
  } catch(e) {
    toast('ผิดพลาด: ' + e.message, 'danger');
    evt.target.value = '';
  }
}

function clearPendingPhoto(studentId) {
  delete _editingPhotoDraft[studentId];
  // Re-render preview to show original (or fallback)
  const s = APP.students.find(x => x.id === studentId) || {};
  const preview = document.getElementById('photo-preview-' + studentId);
  if (preview) {
    preview.innerHTML = s.photo 
      ? `<img src="${s.photo}" style="width:120px;height:150px;object-fit:cover;border-radius:8px;border:3px solid #e5e7eb;box-shadow:var(--shadow)">`
      : studentAvatar(s, 120, {shadow:true});
  }
  const info = document.getElementById('photo-info-' + studentId);
  if (info) info.innerHTML = s.photo ? 'มีภาพเดิม · <button class="btn btn-sm btn-danger" style="padding:2px 8px" onclick="removeStudentPhoto(\''+studentId+'\')">🗑️ ลบภาพ</button>' : 'ยังไม่มีภาพ';
}

function removeStudentPhoto(studentId) {
  confirmDialog('ลบภาพของนักเรียนคนนี้?', () => {
    const s = APP.students.find(x => x.id === studentId);
    if (s) {
      s.photo = '';
      delete _editingPhotoDraft[studentId];
      saveData();
      toast('ลบภาพแล้ว', 'info');
      // Refresh preview
      const preview = document.getElementById('photo-preview-' + studentId);
      if (preview) preview.innerHTML = studentAvatar(s, 120, {shadow:true});
      const info = document.getElementById('photo-info-' + studentId);
      if (info) info.innerHTML = 'ยังไม่มีภาพ';
      if (APP.page === 'students') renderStudents();
    }
  });
}

/**
 * Bulk photo stats for settings display
 */
function getPhotoStats() {
  let withPhoto = 0, totalBytes = 0;
  APP.students.forEach(s => {
    if (s.photo) {
      withPhoto++;
      totalBytes += Math.round(s.photo.length * 0.75); // approx decoded size
    }
  });
  return {
    count: withPhoto,
    total: APP.students.length,
    sizeKB: Math.round(totalBytes / 1024),
    percent: APP.students.length > 0 ? Math.round(withPhoto / APP.students.length * 100) : 0
  };
}

/* ─── Toast ─── */
function toast(msg, type='info', duration=2500) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, duration);
}

/* ─── Modal ─── */
function showModal(title, content, opts = {}) {
  const root = document.getElementById('modal-root');
  const size = opts.size || '';
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal ${size}" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${content}</div>
        ${opts.buttons ? `<div class="modal-actions">${opts.buttons}</div>` : ''}
      </div>
    </div>
  `;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function confirmDialog(msg, onYes, onNo) {
  showModal('ยืนยัน', `<p>${msg}</p>`, {
    buttons: `
      <button class="btn btn-ghost" onclick="closeModal();${onNo ? '('+onNo+')();' : ''}">ยกเลิก</button>
      <button class="btn btn-danger" onclick="closeModal();(${onYes})()">ยืนยัน</button>
    `
  });
}

function emptyState(text, btnText, onClick) {
  const btnId = uid();
  window['_empty_'+btnId] = onClick;
  return `<div class="empty">
    <div class="empty-icon">📭</div>
    <div class="empty-text">${text}</div>
    ${btnText ? `<button class="btn" onclick="window._empty_${btnId}()">${btnText}</button>` : ''}
  </div>`;
}

function addRoom() {
  const input = document.getElementById('new-room-input');
  if (!input) return;
  const val = input.value.trim().replace(/\s+/g,'');
  if (!val) { toast('กรุณาระบุชื่อห้อง', 'warning'); return; }
  if (!/^[0-9ก-๙A-Za-z]+$/.test(val)) { toast('ชื่อห้องต้องเป็นตัวเลข/อักษรเท่านั้น', 'warning'); return; }
  APP.rooms = APP.rooms || {};
  const rooms = APP.rooms[APP.curLevel] = APP.rooms[APP.curLevel] || ['1'];
  if (rooms.includes(val)) { toast('มีห้องนี้อยู่แล้ว', 'warning'); return; }
  rooms.push(val);
  saveData();
  toast(`✅ เพิ่มห้อง ${APP.curLevel}/${val} แล้ว`, 'success');
  renderRoomSelect();
  manageRooms(); // refresh modal
}

function deleteRoom(r) {
  const count = APP.students.filter(s => s.level === APP.curLevel && String(s.room||'1') === String(r)).length;
  if (count > 0) {
    toast(`❌ ห้องนี้มีนักเรียน ${count} คน · ย้ายออกก่อนจึงจะลบได้`, 'danger', 4000);
    return;
  }
  confirmDialog(`ลบห้อง ${APP.curLevel}/${r} ?`, () => {
    APP.rooms[APP.curLevel] = (APP.rooms[APP.curLevel] || []).filter(x => x !== r);
    if (APP.rooms[APP.curLevel].length === 0) APP.rooms[APP.curLevel] = ['1'];
    if (String(APP.curRoom) === String(r)) APP.curRoom = APP.rooms[APP.curLevel][0];
    saveData();
    toast('ลบห้องแล้ว', 'info');
    renderRoomSelect();
    manageRooms();
  });
}

// Migrate old data (ensure every student has a .room field)
function migrateRooms() {
  let migrated = false;
  APP.rooms = APP.rooms || {};
  APP.students.forEach(s => {
    if (!s.room) { s.room = '1'; migrated = true; }
    const lv = s.level;
    if (lv) {
      APP.rooms[lv] = APP.rooms[lv] || ['1'];
      if (!APP.rooms[lv].includes(String(s.room))) {
        APP.rooms[lv].push(String(s.room));
        migrated = true;
      }
    }
  });
  // Ensure all levels have at least [1]
  ['ม.1','ม.2','ม.3','ม.4','ม.5','ม.6'].forEach(lv => {
    if (!APP.rooms[lv] || APP.rooms[lv].length === 0) APP.rooms[lv] = ['1'];
  });
  if (migrated) saveData();
}

function buildWordHtml(body, landscape=false) {
  return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
  <head><meta charset="utf-8"><title>Export</title>
  <style>
    @page { size: A4 ${landscape?'landscape':'portrait'}; margin: 1.5cm; }
    body { font-family:'TH SarabunPSK','Sarabun',sans-serif; font-size:16pt; color:#000; }
    h1,h2,h3 { font-family:'TH SarabunPSK',sans-serif; }
    table { width:100%; border-collapse:collapse; margin:6pt 0; }
    th,td { border:1px solid #333; padding:4pt 6pt; }
    th { background:#1e40af; color:#fff; font-weight:bold; }
    .sec-head { font-size:14pt; font-weight:800; background:#1e40af; color:#fff; padding:6pt 10pt; margin:10pt 0 4pt; border-radius:4pt; }
    .row-even { background:#f8fafc; }
    .row-odd  { background:#fff; }
    .confidential { background:#fee; border:2pt solid #dc2626; color:#dc2626; padding:6pt; font-weight:bold; text-align:center; }
  </style>
  </head><body>${body}</body></html>`;
}

function exportHtmlToWord(body, filename='export', landscape=false) {
  const html = buildWordHtml(body, landscape);
  const blob = new Blob(['\ufeff' + html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename + '.doc';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function saveStudent(id, isNew) {
  const f = document.getElementById('stu-form');
  const fd = new FormData(f);
  const d = Object.fromEntries(fd);
  d.id = id;
  d.number = parseInt(d.number) || 1;
  // Apply pending photo (from draft) or preserve existing
  if (_editingPhotoDraft[id] !== undefined) {
    d.photo = _editingPhotoDraft[id];
    delete _editingPhotoDraft[id];
  } else if (!isNew) {
    const existing = APP.students.find(x => x.id === id);
    d.photo = existing?.photo || '';
  } else {
    d.photo = '';
  }
  if (isNew) APP.students.push(d);
  else {
    const i = APP.students.findIndex(x => x.id === id);
    if (i >= 0) APP.students[i] = {...APP.students[i], ...d};
  }
  if (!saveData()) return; // abort close if save failed (quota)
  closeModal();
  renderStudents();
  toast(isNew?'เพิ่มนักเรียนแล้ว ✅':'บันทึกแล้ว ✅', 'success');
}

function deleteStudent(id) {
  const s = getStudentById(id);
  if (!s) return;
  confirmDialog(`ลบนักเรียน: <b>${s.fname} ${s.lname}</b>?<br>ข้อมูลที่เกี่ยวข้องทั้งหมดจะถูกลบด้วย`, () => {
    APP.students = APP.students.filter(x => x.id !== id);
    delete APP.sdq[id]; delete APP.eq[id]; delete APP.dl1[id];
    delete APP.riskBehaviors[id]; delete APP.screening[id];
    delete APP.healthLog[id]; delete APP.careerPlans[id];
    delete APP.portfolios[id];
    saveData();
    renderStudents();
    toast('ลบแล้ว', 'info');
  });
}

═══════════════════════════════════════════════════════════════ */
let curScoreSubject = null;

function renderScores() {
  const students = getCurStudents();
  const subjects = APP.subjects;
  
  if (!curScoreSubject && subjects.length > 0) curScoreSubject = subjects[0].id;
  
  document.getElementById('content').innerHTML = `
    <div class="card">

        </div>
        <div class="flex gap-8">
          <button class="btn btn-warning" onclick="manageSubjects()">📚 จัดการวิชา</button>

        <div class="empty">

          <button class="btn btn-lg" onclick="addSubjectModal()">➕ เพิ่มวิชาแรก</button>
        </div>
      ` : `
        <!-- Subject tabs -->
        <div class="tabs">
          ${subjects.map(sub => `
            <div class="tab ${curScoreSubject===sub.id?'active':''}" onclick="curScoreSubject='${sub.id}';renderScores()">
              <span style="color:${SUBJECT_GROUPS.find(g=>g.key===sub.group)?.color||'#1e40af'}">
                ${SUBJECT_GROUPS.find(g=>g.key===sub.group)?.icon||'📘'} ${sub.code||''} ${sub.name}
              </span>
            </div>
          `).join('')}
        </div>
        
        ${!curScoreSubject ? emptyState('เลือกวิชา') : renderScoreTable()}
      `}
    </div>
  `;
}

function renderScoreTable() {
  const students = getCurStudents();
  const sub = APP.subjects.find(s => s.id === curScoreSubject);
  if (!sub) return '';
  
  APP.scores[APP.curTerm] = APP.scores[APP.curTerm] || {};
  APP.scores[APP.curTerm][curScoreSubject] = APP.scores[APP.curTerm][curScoreSubject] || {};
  const scores = APP.scores[APP.curTerm][curScoreSubject];
  
  let totalAvg = 0, count = 0;
  
  const rows = students.map((s,i) => {
    const sc = scores[s.id] || {};
    const k1 = Number(sc.k1)||0, mid = Number(sc.mid)||0;
    const k2 = Number(sc.k2)||0, fin = Number(sc.fin)||0;
    const total = k1 + mid + k2 + fin;
    const grade = scoreToGrade(total);
    if (total > 0) { totalAvg += total; count++; }
    return `<tr class="${i%2?'odd':''}">
      <td class="text-center">${s.number||i+1}</td>
      <td class="text-center" style="padding:2px">${studentAvatar(s, 32)}</td>
      <td>${s.prefix||''}${s.fname||''} ${s.lname||''}</td>
      <td><input type="number" class="form-input" style="padding:4px;width:60px;text-align:center" 
        value="${sc.k1||''}" min="0" max="30" 
        onchange="setScore('${s.id}','k1',this.value)"></td>
      <td><input type="number" class="form-input" style="padding:4px;width:60px;text-align:center" 
        value="${sc.mid||''}" min="0" max="20" 
        onchange="setScore('${s.id}','mid',this.value)"></td>
      <td><input type="number" class="form-input" style="padding:4px;width:60px;text-align:center" 
        value="${sc.k2||''}" min="0" max="30" 
        onchange="setScore('${s.id}','k2',this.value)"></td>
      <td><input type="number" class="form-input" style="padding:4px;width:60px;text-align:center" 
        value="${sc.fin||''}" min="0" max="20" 
        onchange="setScore('${s.id}','fin',this.value)"></td>
      <td class="text-center fw-bold">${total||'—'}</td>
      <td class="text-center fw-bold" style="color:${grade.grade>=2?'#10b981':grade.grade>=1?'#f59e0b':'#dc2626'}">${total>0?grade.label:'—'}</td>
    </tr>`;
  }).join('');
  
  const avgScore = count ? (totalAvg/count).toFixed(1) : 0;
  
  return `
    <div class="text-sm text-muted mb-8">
      <b>${sub.name}</b> · ${sub.credits||'1'} หน่วยกิต · ครูผู้สอน: ${sub.teacher||'ยังไม่ระบุ'}
    </div>
    <div class="table-wrap">
      <table class="data">
        <thead>
          <tr>
            <th rowspan="2" style="width:40px">#</th>
            <th rowspan="2" style="width:44px"></th>
            <th rowspan="2" style="text-align:left">ชื่อ-สกุล</th>
            <th colspan="4" style="background:#3b82f6">คะแนนเก็บ (100)</th>
            <th rowspan="2" style="width:60px;background:#8b5cf6">รวม</th>
            <th rowspan="2" style="width:50px;background:#10b981">เกรด</th>
          </tr>
          <tr>
            <th style="background:#60a5fa;width:70px">ก่อนกลาง<br>(30)</th>
            <th style="background:#60a5fa;width:70px">กลางภาค<br>(20)</th>
            <th style="background:#60a5fa;width:70px">หลังกลาง<br>(30)</th>
            <th style="background:#60a5fa;width:70px">ปลายภาค<br>(20)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td colspan="7" class="text-right">ค่าเฉลี่ย</td>
            <td class="text-center">${avgScore}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

function setScore(sid, field, value) {
  APP.scores[APP.curTerm] = APP.scores[APP.curTerm] || {};
  APP.scores[APP.curTerm][curScoreSubject] = APP.scores[APP.curTerm][curScoreSubject] || {};

function saveSubject(id, isNew) {
  const fd = new FormData(document.getElementById('subj-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  d.credits = Number(d.credits) || 1;
  if (isNew) APP.subjects.push(d);
  else {
    const i = APP.subjects.findIndex(x => x.id === id);
    if (i >= 0) APP.subjects[i] = d;
  }
  saveData();
  closeModal();
  manageSubjects();
  toast('บันทึก ✅', 'success');
}

function deleteSubject(id) {
  confirmDialog('ลบวิชานี้? คะแนนที่เกี่ยวข้องจะถูกลบด้วย', () => {
    APP.subjects = APP.subjects.filter(x => x.id !== id);
    [1,2].forEach(t => { if (APP.scores[t]) delete APP.scores[t][id]; });
    if (curScoreSubject === id) curScoreSubject = null;
    saveData();
    closeModal();
    setTimeout(()=>manageSubjects(), 100);
    toast('ลบแล้ว', 'info');
  });
}

function exportScoresWord() {
  const students = getCurStudents();
  const sub = APP.subjects.find(s => s.id === curScoreSubject);
  if (!sub) return;
  const scores = APP.scores[APP.curTerm]?.[curScoreSubject] || {};
  const si = APP.schoolInfo;
  
  const rows = students.map((s,i) => {
    const sc = scores[s.id] || {};
    const k1 = Number(sc.k1)||0, mid = Number(sc.mid)||0;
    const k2 = Number(sc.k2)||0, fin = Number(sc.fin)||0;
    const total = k1+mid+k2+fin;
    const grade = scoreToGrade(total);
    return `<tr class="${i%2?'row-odd':'row-even'}">
      <td style="text-align:center">${s.number||i+1}</td>
      <td>${s.prefix||''}${s.fname||''} ${s.lname||''}</td>
      <td style="text-align:center">${k1||'—'}</td>
      <td style="text-align:center">${mid||'—'}</td>
      <td style="text-align:center">${k2||'—'}</td>
      <td style="text-align:center">${fin||'—'}</td>
      <td style="text-align:center;font-weight:bold">${total||'—'}</td>
      <td style="text-align:center;font-weight:bold">${total>0?grade.label:'—'}</td>
    </tr>`;
  }).join('');
  
  const body = docLogoHeaderHtml('ปพ.5 บันทึกคะแนน', 
    `วิชา ${sub.name} (${sub.code||''}) · ${APP.curLevel} · ภาคเรียนที่ ${APP.curTerm} · ปีการศึกษา ${si.year}`) +
    `<table>
      <thead>
        <tr>
          <th rowspan="2" style="width:5%">เลขที่</th>
          <th rowspan="2" style="text-align:left">ชื่อ-สกุล</th>
          <th colspan="4" style="background:#3b82f6">คะแนนเก็บ</th>
          <th rowspan="2" style="width:8%;background:#8b5cf6">รวม (100)</th>
          <th rowspan="2" style="width:8%;background:#10b981">เกรด</th>
        </tr>
        <tr>
          <th style="width:8%">ก่อนกลาง<br>(30)</th>
          <th style="width:8%">กลาง<br>(20)</th>
          <th style="width:8%">หลังกลาง<br>(30)</th>
          <th style="width:8%">ปลาย<br>(20)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>` +
    sigBlock([
      {name:sub.teacher||si.teacher.name, pos:si.teacher.pos, role:'ครูผู้สอน'},
      {name:si.academic.name, pos:si.academic.pos, role:si.academicRole||'ครูฝ่ายวิชาการ'},
      {name:si.director.name, pos:si.director.pos, role:'ผู้อำนวยการ'},
    ]);
  exportHtmlToWord(body, `ปพ5-${sub.code||sub.name}-${APP.curLevel}-ภาค${APP.curTerm}`, true);
  toast('ส่งออก Word ✅', 'success');
}

  APP.riskBehaviors[sid][key] = (cur + 1) % 4;  // 0→1→2→3→0
  saveData();
  renderRisk();
}

function cyclePob6(sid, section, key) {
  APP.pob6[APP.curTerm] = APP.pob6[APP.curTerm] || {};
  APP.pob6[APP.curTerm][sid] = APP.pob6[APP.curTerm][sid] || {};
  
  if (section === 'flat') {
    const cur = APP.pob6[APP.curTerm][sid][key];
    APP.pob6[APP.curTerm][sid][key] = cur === undefined ? 0 : cur >= 3 ? undefined : cur + 1;
  } else {
    APP.pob6[APP.curTerm][sid][section] = APP.pob6[APP.curTerm][sid][section] || {};
    const cur = APP.pob6[APP.curTerm][sid][section][key];
    APP.pob6[APP.curTerm][sid][section][key] = cur === undefined ? 0 : cur >= 3 ? undefined : cur + 1;
  }
  saveData();
  renderPob6();
}

/* ═══════════════════════════════════════════════════════════════
   🏆 GRADES GPA — ผลการเรียน
═══════════════════════════════════════════════════════════════ */
function renderGrades() {
  const students = getCurStudents();
  const subjects = APP.subjects;
  const scores = APP.scores[APP.curTerm] || {};
  
  // Compute GPA per student
  const gpas = students.map(s => {
    let totalCredit = 0, weightedGrade = 0, subjectGrades = {};
    subjects.forEach(sub => {
      const sc = scores[sub.id]?.[s.id];
      if (sc) {
        const total = (Number(sc.k1)||0)+(Number(sc.mid)||0)+(Number(sc.k2)||0)+(Number(sc.fin)||0);
        if (total > 0) {
          const grade = scoreToGrade(total);
          const cr = Number(sub.credits) || 1;
          weightedGrade += grade.grade * cr;
          totalCredit += cr;
          subjectGrades[sub.id] = {total, grade: grade.grade, label: grade.label};
        }
      }
    });
    const gpa = totalCredit > 0 ? weightedGrade / totalCredit : 0;
    return {student:s, gpa, totalCredit, subjectGrades};
  });
  
  // Sort by GPA desc for ranking
  const ranked = [...gpas].sort((a,b) => b.gpa - a.gpa);
  
  // Stats
  const validGpas = gpas.filter(g => g.totalCredit > 0).map(g => g.gpa);
  const avgGpa = validGpas.length ? (validGpas.reduce((a,b)=>a+b,0) / validGpas.length).toFixed(2) : '—';
  const maxGpa = validGpas.length ? Math.max(...validGpas).toFixed(2) : '—';
  const over35 = validGpas.filter(g => g >= 3.5).length;
  const under2 = validGpas.filter(g => g < 2.0).length;
  
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">🏆 ผลการเรียน GPA (ภาคเรียนที่ ${APP.curTerm})</div>
        <button class="btn btn-info" onclick="exportGradesWord()">📄 ส่งออก Word</button>
      </div>
      
      <!-- Stats -->
      <div class="grid grid-4 mb-16">
        <div class="stat-box"><span class="stat-icon">📊</span><div class="stat-value">${avgGpa}</div><div class="stat-label">GPA เฉลี่ยห้อง</div></div>
        <div class="stat-box" style="border-color:#10b981"><span class="stat-icon">🏆</span><div class="stat-value" style="color:#10b981">${maxGpa}</div><div class="stat-label">GPA สูงสุด</div></div>
        <div class="stat-box" style="border-color:#3b82f6"><span class="stat-icon">🌟</span><div class="stat-value" style="color:#3b82f6">${over35}</div><div class="stat-label">GPA ≥ 3.5</div></div>
        <div class="stat-box" style="border-color:#dc2626"><span class="stat-icon">⚠️</span><div class="stat-value" style="color:#dc2626">${under2}</div><div class="stat-label">GPA < 2.00</div></div>
      </div>
      
      ${students.length===0 || subjects.length===0 ? `
        <div class="empty">
          <div class="empty-icon">📚</div>
          <div class="empty-text">ต้องมีนักเรียนและรายวิชาก่อน</div>
          <div class="flex gap-8" style="justify-content:center;margin-top:12px">
            <button class="btn" onclick="navigate('students')">จัดการนักเรียน</button>
            <button class="btn btn-info" onclick="navigate('scores')">จัดการวิชา</button>
          </div>
        </div>
      ` : `
        <div class="table-wrap">
          <table class="data">
            <thead><tr>
              <th style="width:50px">ลำดับ</th>
              <th style="width:30px">#</th>
              <th style="text-align:left">ชื่อ-สกุล</th>
              ${subjects.map(sub => {
                const g = SUBJECT_GROUPS.find(gg=>gg.key===sub.group);
                return `<th style="width:70px;background:${g?.color||'#1e40af'}" title="${sub.name}">${g?.icon||'📘'}<br><span style="font-size:9px">${sub.code||sub.name.substring(0,8)}</span></th>`;
              }).join('')}
              <th style="width:70px;background:#8b5cf6">นก.รวม</th>
              <th style="width:70px;background:#10b981">GPA</th>
            </tr></thead>
            <tbody>
              ${students.map((s,i) => {
                const rec = gpas.find(g=>g.student.id===s.id);
                const rank = ranked.findIndex(g=>g.student.id===s.id) + 1;
                const rankIcon = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
                return `<tr class="${i%2?'odd':''}">
                  <td class="text-center">${rankIcon} ${rank}</td>
                  <td class="text-center">${s.number||i+1}</td>
                  <td>${s.prefix||''}${s.fname} ${s.lname}</td>
                  ${subjects.map(sub => {
                    const sg = rec.subjectGrades[sub.id];
                    if (!sg) return `<td class="text-center text-muted">—</td>`;
                    const color = sg.grade>=3?'#10b981':sg.grade>=2?'#3b82f6':sg.grade>=1?'#f59e0b':'#dc2626';
                    return `<td class="text-center fw-bold" style="color:${color}">${sg.label}</td>`;
                  }).join('')}
                  <td class="text-center">${rec.totalCredit||0}</td>
                  <td class="text-center fw-bold" style="font-size:14px;color:${rec.gpa>=3?'#10b981':rec.gpa>=2?'#3b82f6':rec.gpa>=1?'#f59e0b':'#dc2626'}">${rec.totalCredit>0?rec.gpa.toFixed(2):'—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}

  showModal(isNew?'➕ มอบหมายงาน':'✏️ แก้ไขงาน', `
    <form id="hw-form" onsubmit="event.preventDefault();saveHomework('${h.id}',${isNew})">

        <div class="form-group">
          <label class="form-label">วิชา</label>
          <select name="subjectId" class="form-select">
            ${APP.subjects.map(s=>`<option value="${s.id}" ${h.subjectId===s.id?'selected':''}>${s.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">กำหนดส่ง</label>
          <input type="date" name="dueDate" class="form-input" value="${h.dueDate||''}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ชื่องาน <span class="req">*</span></label>

      </div>

      </div>
    </form>
  `, {
    buttons:`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
             <button class="btn" onclick="document.getElementById('hw-form').requestSubmit()">💾 บันทึก</button>`
  });
}

function saveHomework(id, isNew) {
  const fd = new FormData(document.getElementById('hw-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  d.submissions = (isNew ? {} : APP.homework.find(x=>x.id===id)?.submissions) || {};
  if (isNew) APP.homework.push(d);
  else {
    const i = APP.homework.findIndex(x=>x.id===id);
    if (i>=0) APP.homework[i] = {...APP.homework[i], ...d};
  }
  saveData();
  closeModal();
  renderHomework();
  toast('บันทึก ✅', 'success');
}

function deleteHomework(id) {
  confirmDialog('ลบงานนี้?', () => {
    APP.homework = APP.homework.filter(x=>x.id!==id);
    saveData();
    renderHomework();
  });
}

function trackHomework(id) {
  const h = APP.homework.find(x=>x.id===id);
  if (!h) return;
  h.submissions = h.submissions || {};
  const students = getCurStudents();
  showModal(`👀 ติดตามการส่ง: ${h.title}`, `
    <div class="text-sm text-muted mb-12">คลิกที่ช่องสถานะเพื่อเปลี่ยน</div>

        <tbody>
          ${students.map(s => {
            const status = h.submissions[s.id];
            const color = status==='submitted'?'#10b981':status==='late'?'#f59e0b':status==='missing'?'#dc2626':'#9ca3af';
            const label = status==='submitted'?'✅ ส่งแล้ว':status==='late'?'⏰ ส่งช้า':status==='missing'?'❌ ไม่ส่ง':'— ยังไม่ตรวจ';
            return `<tr>
              <td class="text-center">${s.number||''}</td>
              <td>${s.fname} ${s.lname}</td>

                <button class="btn btn-sm" style="background:${color}" onclick="cycleHwStatus('${id}','${s.id}')">${label}</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `, {size:'modal-lg', buttons:`<button class="btn" onclick="closeModal();renderHomework()">เสร็จ</button>`});

function cycleHwStatus(hwId, sid) {
  const h = APP.homework.find(x=>x.id===hwId);
  if (!h) return;
  h.submissions = h.submissions || {};
  const cur = h.submissions[sid];
  const order = [undefined, 'submitted', 'late', 'missing'];
  const idx = order.indexOf(cur);
  const next = order[(idx+1) % order.length];
  if (next === undefined) delete h.submissions[sid];
  else h.submissions[sid] = next;
  saveData();
  trackHomework(hwId);
}

function saveTeachlog(id, isNew) {
  const fd = new FormData(document.getElementById('tl-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  d.period = Number(d.period) || 1;
  if (isNew) APP.teachLogs.push(d);
  else {
    const i = APP.teachLogs.findIndex(x=>x.id===id);
    if (i>=0) APP.teachLogs[i] = d;
  }
  saveData();
  closeModal();
  renderTeachlog();
  toast('บันทึก ✅', 'success');
}

function deleteTeachlog(id) {
  confirmDialog('ลบบันทึกนี้?', () => {
    APP.teachLogs = APP.teachLogs.filter(x=>x.id!==id);
    saveData();
    renderTeachlog();
  });
}

    </div>
  `;
}

function editScheduleSlot(dow, periodIdx) {
  APP.schedules[dow] = APP.schedules[dow] || [];
  const cur = APP.schedules[dow][periodIdx] || {subjectId:'', room:'', level:''};
  showModal(`🕐 ${WEEKDAYS.find(d=>d.key===dow).name} คาบ ${periodIdx+1}`, `
    <form id="sch-form" onsubmit="event.preventDefault();saveScheduleSlot('${dow}',${periodIdx})">
      <div class="form-group">
        <label class="form-label">วิชา</label>
        <select name="subjectId" class="form-select">
          <option value="">— ว่าง —</option>
          ${APP.subjects.map(s=>`<option value="${s.id}" ${cur.subjectId===s.id?'selected':''}>${s.code||''} ${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="grid grid-2">
        <div class="form-group">
          <label class="form-label">ระดับชั้น</label>
          <select name="level" class="form-select">
            <option value="">—</option>
            ${LEVELS.flatMap(l => [1,2,3,4,5].map(r => `<option ${cur.level===l.key+'/'+r?'selected':''}>${l.key}/${r}</option>`)).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ห้อง</label>
          <input name="room" class="form-input" value="${cur.room||''}" placeholder="เช่น อาคาร 1 ชั้น 2">

    buttons:`

      <button class="btn btn-danger" onclick="clearScheduleSlot('${dow}',${periodIdx})">🗑️ ล้าง</button>
      <button class="btn" onclick="document.getElementById('sch-form').requestSubmit()">💾 บันทึก</button>
    `
  });
}

function saveScheduleSlot(dow, periodIdx) {
  const fd = new FormData(document.getElementById('sch-form'));
  const d = Object.fromEntries(fd);
  APP.schedules[dow] = APP.schedules[dow] || [];
  if (d.subjectId) APP.schedules[dow][periodIdx] = d;
  else APP.schedules[dow][periodIdx] = null;
  saveData();
  closeModal();
  renderSchedule();
  toast('บันทึก ✅', 'success');
}

function clearScheduleSlot(dow, periodIdx) {
  APP.schedules[dow] = APP.schedules[dow] || [];
  APP.schedules[dow][periodIdx] = null;
  saveData();
  closeModal();
  renderSchedule();
  toast('ล้างคาบ ✅', 'info');
}

function exportScheduleWord() {
  const si = APP.schoolInfo;
  const periods = [1,2,3,4,5,6,7,8];
  
  const body = docLogoHeaderHtml('ตารางสอนครู', 
    `ครูผู้สอน ${si.teacher.name||'—'} · ปีการศึกษา ${si.year}`) +
    `<table>
      <thead><tr>
        <th style="width:10%">วัน</th>
        ${periods.map(p => `<th>คาบ ${p}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${WEEKDAYS.map(d => `<tr>
          <td style="background:${d.color};font-weight:bold;text-align:center">${d.name}</td>
          ${periods.map(p => {
            const sch = APP.schedules[d.key]?.[p-1] || null;
            const sub = sch ? APP.subjects.find(s=>s.id===sch.subjectId) : null;
            return `<td style="text-align:center;font-size:9pt">
              ${sub ? `<b>${sub.code||sub.name}</b><br>${sch.level||''} ${sch.room||''}` : '—'}
            </td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>` +
    sigBlock([
      {name:si.teacher.name, pos:si.teacher.pos, role:'ครูผู้สอน'},
      {name:si.academic.name, pos:si.academic.pos, role:si.academicRole||'ครูฝ่ายวิชาการ'},
    ]);
  exportHtmlToWord(body, `ตารางสอน-${si.teacher.name||'ครู'}`, true);
  toast('ส่งออก Word ✅', 'success');
}

/* ═══════════════════════════════════════════════════════════════
   🧠 SDQ — แบบประเมินพฤติกรรมเด็ก (ดล.2/3/4)
═══════════════════════════════════════════════════════════════ */
let sdqStudentId = null;
let sdqRespondent = 'self';  // self | parent | teacher

function renderSdq() {
  const students = getCurStudents();
  if (!sdqStudentId && students.length > 0) sdqStudentId = students[0].id;
  const s = students.find(x=>x.id===sdqStudentId);
  
  document.getElementById('content').innerHTML = `
    <div class="confidential">🔒 SDQ — แบบคัดกรองพฤติกรรมเด็ก (ข้อมูลความลับ)</div>
    
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">🧠 SDQ แบบประเมินจุดแข็ง-จุดอ่อน 25 ข้อ</div>
          <div class="text-sm text-muted">สำหรับวัยรุ่น 11-16 ปี · เกณฑ์ ปกติ / ก้ำกึ่ง / ผิดปกติ</div>
        </div>
        <button class="btn btn-info" onclick="exportSdqWord()">📄 ส่งออก Word ห้องรวม</button>
      </div>
      
      <div class="grid grid-2 mb-12">
        <div class="form-group">
          <label class="form-label">นักเรียน</label>
          <select class="form-select" onchange="sdqStudentId=this.value;renderSdq()">
            ${students.map(st => `<option value="${st.id}" ${sdqStudentId===st.id?'selected':''}>${st.number||''} ${st.fname} ${st.lname}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ผู้ประเมิน (ดล.)</label>
          <div class="flex gap-8">
            <button class="btn ${sdqRespondent==='self'?'':'btn-ghost'}" onclick="sdqRespondent='self';renderSdq()">ดล.2 นักเรียน</button>
            <button class="btn ${sdqRespondent==='parent'?'':'btn-ghost'}" onclick="sdqRespondent='parent';renderSdq()">ดล.3 ผู้ปกครอง</button>
            <button class="btn ${sdqRespondent==='teacher'?'':'btn-ghost'}" onclick="sdqRespondent='teacher';renderSdq()">ดล.4 ครู</button>
          </div>
        </div>
      </div>
      
      ${!s ? emptyState('ยังไม่มีนักเรียน') : renderSdqQuestions(s)}
    </div>
  `;
}

function renderSdqQuestions(s) {
  APP.sdq[s.id] = APP.sdq[s.id] || {self:{}, parent:{}, teacher:{}};
  const rec = APP.sdq[s.id][sdqRespondent] || {};
  const scores = calcSDQScores(rec);
  
  const scale = [
    {v:0, label:'ไม่จริง', color:'#e5e7eb'},
    {v:1, label:'ค่อนข้างจริง', color:'#fde68a'},
    {v:2, label:'จริง', color:'#fca5a5'},
  ];
  
  return `
    <!-- Student header -->
    <div style="display:flex;gap:12px;align-items:center;padding:12px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:8px;margin-bottom:12px">
      ${studentAvatar(s, 72, {shadow:true})}
      <div>
        <div style="font-size:18px;font-weight:bold;color:#92400e">${s.prefix||''}${s.fname} ${s.lname}</div>
        <div style="font-size:13px;color:#78350f;margin-top:2px">${s.level}/${s.room||'1'} · เลขที่ ${s.number||'—'} ${s.nickname?'· ('+s.nickname+')':''}</div>
      </div>
    </div>
    
    <!-- Scoring summary -->
    ${scores ? `
      <div class="card" style="background:#f0f9ff;margin-bottom:12px">
        <div class="card-title">📊 ผลการประเมิน</div>
        <div class="grid grid-6">
          ${[
            {name:'อารมณ์', key:'emotional', score:scores.emotional, cls:scores.emoClass},
            {name:'ความประพฤติ', key:'conduct', score:scores.conduct, cls:scores.condClass},
            {name:'สมาธิสั้น', key:'hyperactive', score:scores.hyperactive, cls:scores.hyperClass},
            {name:'เพื่อน', key:'peer', score:scores.peer, cls:scores.peerClass},
            {name:'สัมพันธภาพ(+)', key:'prosocial', score:scores.prosocial, cls:scores.prosocClass},
            {name:'รวม(ปัญหา)', key:'total', score:scores.totalDiff, cls:scores.totalClass},
          ].map(x => {
            const color = x.cls==='normal'?'#10b981':x.cls==='borderline'?'#f59e0b':'#dc2626';
            const label = x.cls==='normal'?'ปกติ':x.cls==='borderline'?'ก้ำกึ่ง':'ผิดปกติ';
            return `<div style="background:#fff;padding:10px;border-radius:8px;text-align:center;border-top:3px solid ${color}">
              <div class="text-xs">${x.name}</div>
              <div style="font-size:20px;font-weight:800;color:${color}">${x.score}</div>
              <div class="text-xs" style="color:${color};font-weight:700">${label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    ` : ''}
    
    <!-- 25 items -->
    <div class="table-wrap">
      <table class="data">
        <thead><tr>
          <th style="width:40px">ข้อ</th>
          <th style="text-align:left">ข้อความ</th>
          <th style="width:240px" colspan="3">ระดับ</th>
        </tr></thead>
        <tbody>
          ${SDQ_ITEMS.map(it => {
            const v = rec[it.no];
            return `<tr>
              <td class="text-center fw-bold">${it.no}</td>
              <td class="text-sm">${it.text}${it.reverse?' <span class="badge badge-info">R</span>':''}</td>
              ${scale.map(sc => `<td style="background:${v===sc.v?sc.color:'#fff'};cursor:pointer;text-align:center;padding:8px;font-size:11px"
                onclick="setSdq('${s.id}',${it.no},${sc.v})">${sc.label}</td>`).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function setSdq(sid, qNo, value) {
  APP.sdq[sid] = APP.sdq[sid] || {self:{}, parent:{}, teacher:{}};
  APP.sdq[sid][sdqRespondent] = APP.sdq[sid][sdqRespondent] || {};
  APP.sdq[sid][sdqRespondent][qNo] = value;
  saveData();
  renderSdq();
}

function exportSdqWord() {
  const students = getCurStudents();
  const si = APP.schoolInfo;
  
  const rows = students.map((s,i) => {
    const sc = calcSDQScores(APP.sdq[s.id]?.self || {});
    if (!sc) return `<tr class="${i%2?'row-odd':'row-even'}"><td style="text-align:center">${s.number||i+1}</td><td>${s.fname} ${s.lname}</td><td colspan="6" class="text-center">ยังไม่ประเมิน</td></tr>`;
    const color = c => c==='normal'?'🟢':c==='borderline'?'🟡':'🔴';
    return `<tr class="${i%2?'row-odd':'row-even'}">
      <td style="text-align:center">${s.number||i+1}</td>
      <td>${s.fname} ${s.lname}</td>
      <td style="text-align:center">${color(sc.emoClass)} ${sc.emotional}</td>
      <td style="text-align:center">${color(sc.condClass)} ${sc.conduct}</td>
      <td style="text-align:center">${color(sc.hyperClass)} ${sc.hyperactive}</td>
      <td style="text-align:center">${color(sc.peerClass)} ${sc.peer}</td>
      <td style="text-align:center">${color(sc.prosocClass)} ${sc.prosocial}</td>
      <td style="text-align:center">${color(sc.totalClass)} ${sc.totalDiff}</td>
    </tr>`;
  }).join('');
  
  const body = `<div class="confidential">🔒 ความลับ — สรุป SDQ รายห้อง</div>` +
    docLogoHeaderHtml('สรุปผลการประเมิน SDQ', `ชั้น ${APP.curLevel} · ปีการศึกษา ${si.year}`) +
    `<p>🟢 = ปกติ &nbsp; 🟡 = ก้ำกึ่ง &nbsp; 🔴 = ผิดปกติ</p>
    <table style="font-size:10pt">
      <thead><tr>
        <th>เลขที่</th><th style="text-align:left">ชื่อ-สกุล</th>
        <th>อารมณ์</th><th>ประพฤติ</th><th>สมาธิสั้น</th><th>เพื่อน</th>
        <th>สัมพันธภาพ</th><th>รวมปัญหา</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>` +
    sigBlock([{name:si.teacher.name, pos:si.teacher.pos, role:'ครูที่ปรึกษา'}]);
  exportHtmlToWord(body, `SDQ-${APP.curLevel}`, true);
  toast('ส่งออก ✅', 'success');
}

/* ═══════════════════════════════════════════════════════════════
   💖 EQ — ความฉลาดทางอารมณ์ (ดล.6)
═══════════════════════════════════════════════════════════════ */
let eqStudentId = null;

function renderEq() {
  const students = getCurStudents();
  if (!eqStudentId && students.length > 0) eqStudentId = students[0].id;
  const s = students.find(x=>x.id===eqStudentId);
  
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">💖 EQ ความฉลาดทางอารมณ์ (ดล.6)</div>
        <button class="btn btn-info" onclick="exportEqWord()">📄 ส่งออก Word</button>
      </div>
      
      <div class="form-group">
        <label class="form-label">นักเรียน</label>
        <select class="form-select" onchange="eqStudentId=this.value;renderEq()">
          ${students.map(st => `<option value="${st.id}" ${eqStudentId===st.id?'selected':''}>${st.number||''} ${st.fname} ${st.lname}</option>`).join('')}
        </select>
      </div>
      
      ${!s ? emptyState('ยังไม่มีนักเรียน') : renderEqForm(s)}
    </div>
  `;
}

function renderEqForm(s) {
  APP.eq[s.id] = APP.eq[s.id] || {};
  const rec = APP.eq[s.id];
  const scale = [
    {v:1, label:'ไม่เคย'}, {v:2, label:'บางครั้ง'}, {v:3, label:'บ่อย'}, {v:4, label:'ประจำ'}
  ];
  
  const header = `
    <div style="display:flex;gap:12px;align-items:center;padding:12px;background:linear-gradient(135deg,#fce7f3,#fbcfe8);border-radius:8px;margin-bottom:12px">
      ${studentAvatar(s, 72, {shadow:true})}
      <div>
        <div style="font-size:18px;font-weight:bold;color:#9d174d">${s.prefix||''}${s.fname} ${s.lname}</div>
        <div style="font-size:13px;color:#831843;margin-top:2px">${s.level}/${s.room||'1'} · เลขที่ ${s.number||'—'} ${s.nickname?'· ('+s.nickname+')':''}</div>
      </div>
    </div>
  `;
  
  return header + EQ_DOMAINS.map(d => {
    const dRec = rec[d.key] || {};
    const avg = d.components.reduce((sum,c) => sum + (Number(dRec[c.k])||0), 0) / d.components.length;
    const level = avg >= 3.5?'ดีเยี่ยม':avg >= 2.5?'ดี':avg >= 1.5?'ปานกลาง':avg > 0?'ควรพัฒนา':'ยังไม่ประเมิน';
    const color = avg >= 3.5?'#10b981':avg >= 2.5?'#3b82f6':avg >= 1.5?'#f59e0b':'#dc2626';
    
    return `
      <div class="card" style="border-left:4px solid ${d.color};margin-bottom:12px">
        <div class="flex-between mb-12">
          <div class="fw-bold" style="color:${d.color};font-size:17px">🌟 ${d.name}</div>
          ${avg>0 ? `<span class="badge" style="background:${color}20;color:${color};font-weight:700">${avg.toFixed(2)} · ${level}</span>` : ''}
        </div>
        ${d.components.map(c => `
          <div class="form-group">
            <label class="form-label">${c.n}</label>
            <div class="flex gap-4">
              ${scale.map(sc => `
                <button class="btn btn-sm ${dRec[c.k]==sc.v?'':'btn-ghost'}" 
                  style="${dRec[c.k]==sc.v?`background:${d.color};color:#fff`:''};flex:1"
                  onclick="setEq('${s.id}','${d.key}','${c.k}',${sc.v})">${sc.v}. ${sc.label}</button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function setEq(sid, domain, comp, value) {
  APP.eq[sid] = APP.eq[sid] || {};
  APP.eq[sid][domain] = APP.eq[sid][domain] || {};
  APP.eq[sid][domain][comp] = value;
  saveData();
  renderEq();
}

function exportEqWord() {
  const students = getCurStudents();
  const si = APP.schoolInfo;
  const rows = students.map((s,i) => {
    const rec = APP.eq[s.id] || {};
    const results = EQ_DOMAINS.map(d => {
      const dRec = rec[d.key] || {};
      const avg = d.components.reduce((sum,c) => sum + (Number(dRec[c.k])||0), 0) / d.components.length;
      const lvl = avg >= 3.5?'ดีเยี่ยม':avg >= 2.5?'ดี':avg >= 1.5?'ปานกลาง':avg > 0?'ควรพัฒนา':'—';
      return `<td style="text-align:center">${avg>0?avg.toFixed(2):'—'}<br><span style="font-size:9pt;color:#666">${lvl}</span></td>`;
    }).join('');
    return `<tr class="${i%2?'row-odd':'row-even'}">
      <td style="text-align:center">${s.number||i+1}</td>
      <td>${s.fname} ${s.lname}</td>
      ${results}
    </tr>`;
  }).join('');
  
  const body = docLogoHeaderHtml('สรุปผลการประเมิน EQ (ดล.6)', `ชั้น ${APP.curLevel} · ปีการศึกษา ${si.year}`) +
    `<table>

function saveHomeVisit(id, isNew) {
  const fd = new FormData(document.getElementById('hv-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  if (isNew) APP.homeVisits.push(d);
  else {
    const i = APP.homeVisits.findIndex(x=>x.id===id);
    if (i>=0) APP.homeVisits[i] = d;
  }
  saveData();
  closeModal();
  renderHomeVisit();
  toast('บันทึก ✅', 'success');
}

function deleteHomeVisit(id) {
  confirmDialog('ลบบันทึกนี้?', () => {
    APP.homeVisits = APP.homeVisits.filter(x=>x.id!==id);
    saveData();
    renderHomeVisit();
  });
}

  });
}

function saveClub(id, isNew) {
  const fd = new FormData(document.getElementById('club-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  if (isNew) { d.members = []; APP.clubs.push(d); }
  else {
    const i = APP.clubs.findIndex(x=>x.id===id);
    if (i>=0) APP.clubs[i] = {...APP.clubs[i], ...d};
  }
  saveData();
  closeModal();
  renderClubs();
  toast('บันทึก ✅', 'success');
}

function deleteClub(id) {
  confirmDialog('ลบกิจกรรม?', () => {
    APP.clubs = APP.clubs.filter(x=>x.id!==id);
    saveData();
    renderClubs();
  });
}

function manageClubMembers(id) {
  const cl = APP.clubs.find(x=>x.id===id);
  if (!cl) return;
  cl.members = cl.members || [];
  const allStudents = APP.students;
  
  showModal(`👥 สมาชิก: ${cl.name}`, `
    <div class="text-sm text-muted mb-12">คลิกเพื่อเพิ่ม/ลบสมาชิก · สมาชิก ${cl.members.length} คน</div>
    <div style="max-height:60vh;overflow:auto">
      ${LEVELS.map(lv => {
        const sts = allStudents.filter(s => s.level === lv.key);
        if (sts.length === 0) return '';
        return `<div style="margin-bottom:12px">
          <div style="background:${lv.color};color:#fff;padding:6px 10px;border-radius:6px;font-weight:700">${lv.key}</div>
          <div style="padding:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${sts.map(s => {
              const checked = cl.members.includes(s.id);
              return `<button class="btn btn-sm ${checked?'':'btn-ghost'}" 
                style="${checked?'background:#10b981;color:#fff':''}"
                onclick="toggleClubMember('${id}','${s.id}')">${checked?'✓ ':''}${s.fname} ${s.lname}</button>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  `, {size:'modal-lg', buttons:`<button class="btn" onclick="closeModal();renderClubs()">เสร็จ</button>`});
}

function toggleClubMember(clubId, sid) {
  const cl = APP.clubs.find(x=>x.id===clubId);
  if (!cl) return;
  cl.members = cl.members || [];
  const idx = cl.members.indexOf(sid);
  if (idx >= 0) cl.members.splice(idx, 1);
  else cl.members.push(sid);
  saveData();
  manageClubMembers(clubId);
}

function toggleDutyStudent(dow, sid, btn) {
  const duty = APP.dutySchedule[dutyWeek][dow] = APP.dutySchedule[dutyWeek][dow] || {students:[], task:''};
  const idx = duty.students.indexOf(sid);
  if (idx >= 0) {
    duty.students.splice(idx, 1);
    btn.className = 'btn btn-sm btn-ghost';
    btn.style.cssText = '';
    btn.innerHTML = btn.innerHTML.replace(/^✓ /, '');
  } else {
    duty.students.push(sid);
    btn.className = 'btn btn-sm';
    btn.style.cssText = 'background:#10b981;color:#fff';
    btn.innerHTML = '✓ ' + btn.innerHTML;
  }
}

function saveDuty(dow) {
  const fd = new FormData(document.getElementById('duty-form'));
  const d = Object.fromEntries(fd);
  APP.dutySchedule[dutyWeek] = APP.dutySchedule[dutyWeek] || {};
  APP.dutySchedule[dutyWeek][dow] = APP.dutySchedule[dutyWeek][dow] || {students:[]};
  APP.dutySchedule[dutyWeek][dow].task = d.task;
  saveData();
  closeModal();
  renderDuty();
  toast('บันทึก ✅', 'success');
}

function autoAssignDuty() {
  const students = getCurStudents();
  if (students.length === 0) return;
  
  confirmDialog(`สุ่มจัดเวรสัปดาห์ ${dutyWeek} ทับของเดิม?`, () => {
    // Shuffle students
    const shuffled = [...students].sort(() => Math.random() - 0.5);
    const perDay = Math.max(2, Math.ceil(students.length / 5));
    
    WEEKDAYS.forEach((d, idx) => {
      const assigned = shuffled.slice(idx * perDay, (idx + 1) * perDay).map(s => s.id);
      APP.dutySchedule[dutyWeek] = APP.dutySchedule[dutyWeek] || {};
      APP.dutySchedule[dutyWeek][d.key] = {students: assigned, task: 'กวาดพื้น · เช็ดกระดาน · เก็บขยะ'};
    });
    saveData();
    renderDuty();
    toast('สุ่มเวรเสร็จแล้ว ✅', 'success');
  });
}

function exportDutyWord() {
  const si = APP.schoolInfo;
  const rows = WEEKDAYS.map(d => {
    const duty = APP.dutySchedule[dutyWeek]?.[d.key] || {students:[], task:''};
    const names = duty.students.map(sid => {
      const s = getStudentById(sid);
      return s ? `${s.number||''} ${s.fname} ${s.lname}` : '';
    }).filter(Boolean).join(', ');
    return `<tr>
      <td style="background:${d.color};text-align:center;font-weight:bold;width:15%">${d.name}</td>
      <td style="width:50%">${names||'—'}</td>
      <td>${duty.task||'—'}</td>
    </tr>`;
  }).join('');
  
  const body = docLogoHeaderHtml('ตารางเวรประจำวัน', `ห้อง ${APP.curLevel}/${APP.curRoom||'1'} · สัปดาห์ ${dutyWeek}`) +
    `<table>
      <thead><tr><th>วัน</th><th>นักเรียนเวร</th><th>งานที่ต้องทำ</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` +
    sigBlock([
      {name:si.teacher.name, pos:si.teacher.pos, role:'ครูที่ปรึกษา'},
    ]);
  exportHtmlToWord(body, `เวร-${APP.curLevel}-สัปดาห์${dutyWeek}`);
  toast('ส่งออก ✅', 'success');
}

function setCareer(sid, field, value) {
  APP.careerPlans[sid] = APP.careerPlans[sid] || {};
  APP.careerPlans[sid][field] = value;
  saveData();
  renderCareer();
}

function toggleTcasRound(sid, roundNo) {
  APP.careerPlans[sid] = APP.careerPlans[sid] || {};
  let rounds = (APP.careerPlans[sid].tcasRounds||'').split(',').filter(Boolean);
  const ns = String(roundNo);
  const idx = rounds.indexOf(ns);
  if (idx >= 0) rounds.splice(idx, 1);
  else rounds.push(ns);
  APP.careerPlans[sid].tcasRounds = rounds.join(',');
  saveData();
  renderCareer();
}

function exportCareerWord() {
  const students = getCurStudents();
  const si = APP.schoolInfo;
  const rows = students.map((s,i) => {
    const p = APP.careerPlans[s.id] || {};
    const goalName = p.goal==='study'?'ศึกษาต่อ':p.goal==='work'?'ทำงาน':'ยังไม่ตัดสินใจ';
    return `<tr class="${i%2?'row-odd':'row-even'}">

  exportHtmlToWord(body, `แนะแนว-${APP.curLevel}-${si.year}`, true);

function saveParent(id, isNew) {
  const fd = new FormData(document.getElementById('pc-form'));
  const d = Object.fromEntries(fd);
  d.id = id;
  if (isNew) APP.parentContacts.push(d);
  else {
    const i = APP.parentContacts.findIndex(x=>x.id===id);
    if (i>=0) APP.parentContacts[i] = d;
  }
  saveData();
  closeModal();
  renderParent();
  toast('บันทึก ✅', 'success');
}

function deleteParent(id) {
  confirmDialog('ลบบันทึก?', () => {
    APP.parentContacts = APP.parentContacts.filter(x=>x.id!==id);
    saveData();
    renderParent();
  });
}

/* ─── AI Voice (Web Speech API) ─── */
function speakTH(text, rate=0.95, pitch=1.1) {
  if (!_aiVoiceOn) return;
  if (!window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH';
    u.rate = rate;
    u.pitch = pitch;
    const voices = speechSynthesis.getVoices();
    const thVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('th'));
    if (thVoice) u.voice = thVoice;
    speechSynthesis.speak(u);
  } catch(e) { console.warn('TTS failed', e); }
}

function toggleAiVoice() {
  _aiVoiceOn = !_aiVoiceOn;
  toast(_aiVoiceOn ? '🔊 เปิดเสียง AI' : '🔇 ปิดเสียง AI', 'info');
  if (_aiVoiceOn) speakTH('เปิดเสียงแล้วค่ะ');
  renderRandom();
}

/* ─── Web Audio (Beep) ─── */
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return _audioCtx;
}

function playBeep(freq=880, duration=300, volume=0.3) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration/1000);
    osc.start();
    osc.stop(ctx.currentTime + duration/1000);
  } catch(e) { console.warn('Beep failed', e); }
}

function playFinalChime() {
  playBeep(880, 200);
  setTimeout(() => playBeep(1100, 200), 220);
  setTimeout(() => playBeep(1320, 400), 440);
  setTimeout(() => playBeep(1760, 600), 850);
}

function randomPickOne() {
  const students = getCurStudents();
  if (students.length === 0) return;
  
  const noRepeat = document.getElementById('pick-no-repeat')?.checked;
  const excludeAbsent = document.getElementById('pick-absent-exclude')?.checked;
  
  let pool = [...students];
  
  if (noRepeat) {
    const recentIds = _randomHistory.slice(0, 10).map(h => h.sid);
    pool = pool.filter(s => !recentIds.includes(s.id));
    if (pool.length === 0) pool = [...students]; // reset
  }
  
  if (excludeAbsent) {
    const today = APP.attendance[todayKey()] || {};
    pool = pool.filter(s => !['A','S','L'].includes(today[s.id]));
    if (pool.length === 0) { toast('ทุกคนขาด/ลา วันนี้', 'warning'); return; }
  }
  
  const picked = pool[Math.floor(Math.random() * pool.length)];
  const el = document.getElementById('random-picked');
  if (!el) return;
  
  // Animation with tick sound
  let count = 0;
  const interval = setInterval(() => {
    const temp = students[Math.floor(Math.random() * students.length)];
    el.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        ${studentAvatar(temp, 80)}
        <div style="font-size:22px;color:#64748b">${temp.prefix||''}${temp.fname}</div>
      </div>
    `;
    if (count % 2 === 0) playTickBeep();
    count++;
    if (count >= 14) {
      clearInterval(interval);
      // Final reveal with BIG photo
      el.innerHTML = `
        <div style="animation:pop .4s ease;display:flex;flex-direction:column;align-items:center;gap:12px">
          <div style="position:relative">
            ${studentAvatar(picked, 140, {shadow:true})}
            <div style="position:absolute;top:-12px;right:-12px;background:#fbbf24;color:#7c2d12;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow);animation:pulse 1s infinite">🎉</div>
          </div>
          <div style="font-size:28px;font-weight:bold;color:#1e40af">${picked.prefix||''}${picked.fname} ${picked.lname}</div>
          <div style="font-size:16px;color:#64748b">เลขที่ ${picked.number||'—'} ${picked.nickname?`· (${picked.nickname})`:''}</div>
          <div style="display:flex;gap:6px">
            <span class="badge badge-info">${picked.level}</span>
            ${picked.gender ? `<span class="badge badge-secondary">${picked.gender}</span>` : ''}
          </div>
        </div>
      `;
      playFinalChime();
      // AI announce
      speakTH('สุ่มได้คุณ ' + (picked.prefix||'') + picked.fname + ' ' + picked.lname);
      _randomHistory.unshift({sid: picked.id, date: todayKey(), time: new Date().toTimeString().slice(0,8)});
      _randomHistory = _randomHistory.slice(0, 50);
      setTimeout(() => renderRandom(), 2800);
    }
  }, 70);
}

function manualPickOne(sid) {
  const s = getStudentById(sid);

  _randomHistory.unshift({sid: s.id, date: todayKey(), time: new Date().toTimeString().slice(0,8), manual:true});
  speakTH(s.prefix + s.fname);
  toast(`เลือก ${s.prefix}${s.fname}`, 'info');
  renderRandom();
}

function adjustGroupCount(delta) {
  const el = document.getElementById('group-count');
  if (!el) return;
  const v = Math.max(2, Math.min(15, (parseInt(el.value)||5) + delta));
  el.value = v;
}

function randomGroupStudents() {
  const students = getCurStudents();
  if (students.length === 0) return;
  const n = Math.max(2, Math.min(15, parseInt(document.getElementById('group-count').value) || 5));
  const method = document.querySelector('input[name="group-method"]:checked')?.value || 'random';
  const excludeAbsent = document.getElementById('group-exclude-absent')?.checked;
  _lastGroupMethod = method;
  
  let pool = [...students];
  if (excludeAbsent) {
    const today = APP.attendance[todayKey()] || {};
    pool = pool.filter(s => !['A','S','L'].includes(today[s.id]));
  }
  if (pool.length === 0) { toast('ไม่มีนักเรียนที่มาเรียนวันนี้', 'warning'); return; }
  
  const groups = Array.from({length: n}, () => []);
  
  if (method === 'gender') {
    const males = pool.filter(s => s.gender === 'ชาย').sort(() => Math.random() - 0.5);
    const females = pool.filter(s => s.gender === 'หญิง').sort(() => Math.random() - 0.5);
    // Distribute males first, then females in opposite direction for balance
    males.forEach((s, i) => groups[i % n].push(s));
    females.forEach((s, i) => groups[(n - 1 - (i % n))].push(s));
  } else if (method === 'grade') {
    pool.sort((a, b) => (Number(b.gpax)||0) - (Number(a.gpax)||0));
    // Snake distribution: 0,1,2,3,3,2,1,0,0,1,...
    pool.forEach((s, i) => {
      const row = Math.floor(i / n);
      const col = (row % 2 === 0) ? (i % n) : (n - 1 - (i % n));
      groups[col].push(s);
    });
  } else if (method === 'alternate') {
    pool.sort((a, b) => (a.number||0) - (b.number||0));
    pool.forEach((s, i) => groups[i % n].push(s));
  } else {
    pool.sort(() => Math.random() - 0.5).forEach((s, i) => groups[i % n].push(s));
  }
  
  _lastGroups = groups;
  playFinalChime();
  speakTH('แบ่งเสร็จแล้ว ' + n + ' กลุ่ม');
  toast(`แบ่ง ${n} กลุ่ม · วิธี ${({random:'สุ่ม',gender:'ผสมเพศ',grade:'คละเกรด',alternate:'ตามเลขที่'})[method]}`, 'success');
  renderRandom();
}

  return `

        <!-- Big display -->
        <div style="padding:40px 20px;border-radius:16px;text-align:center;box-shadow:var(--shadow-lg);background:${isEnded?'linear-gradient(135deg,#fecaca,#fca5a5)':t.running?'linear-gradient(135deg,#bfdbfe,#93c5fd)':'linear-gradient(135deg,#e5e7eb,#d1d5db)'};border:4px solid ${isEnded?'#dc2626':t.running?'#2563eb':'#9ca3af'};transition:all .3s">

              <div style="height:12px;background:#fff;border-radius:6px;overflow:hidden;border:2px solid #cbd5e1">
                <div style="height:100%;background:linear-gradient(90deg,${isEnded?'#dc2626,#fca5a5':pct<25?'#ef4444':pct<50?'#f59e0b':'#10b981'});width:${pct}%;transition:width 1s linear"></div>
              </div>
              <div class="text-sm text-muted" style="margin-top:6px">${t.total > 0 ? `${formatTimerSec(t.total - t.remaining)} / ${formatTimerSec(t.total)}` : 'เลือก preset หรือตั้งค่าเอง'}</div>

        </div>
        
        <!-- Controls -->
