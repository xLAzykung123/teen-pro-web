function formatTimerSec(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function switchTimerMode(mode) {
  if (_timerState.running) {
    if (!confirm('เปลี่ยนโหมดจะหยุดเวลาปัจจุบัน ยืนยัน?')) return;
    pauseTimer();
  }
  _timerState = {
    mode, remaining: 0, total: 0, running: false, intervalId: null,
    startMs: 0, elapsed: 0, label: ''
  };
  renderRandom();
}

function setTimerPreset(sec, label) {
  _timerState.mode = 'countdown';
  _timerState.total = sec;
  _timerState.remaining = sec;
  _timerState.running = false;
  _timerState.label = label || '';
  renderRandom();
  speakTH('ตั้งเวลา ' + label);
}

function setTimerCustom() {
  const h = parseInt(document.getElementById('timer-h').value) || 0;
  const m = parseInt(document.getElementById('timer-m').value) || 0;
  const s = parseInt(document.getElementById('timer-s').value) || 0;
  const label = document.getElementById('timer-label').value.trim();
  const total = h * 3600 + m * 60 + s;
  if (total === 0) { toast('กรุณาตั้งเวลามากกว่า 0', 'warning'); return; }
  _timerState.mode = 'countdown';
  _timerState.total = total;
  _timerState.remaining = total;
  _timerState.running = false;
  _timerState.label = label;
  toast(`ตั้งเวลา ${formatTimerSec(total)}`, 'success');
  renderRandom();
}

function startTimer() {
  if (_timerState.running) return;
  
  if (_timerState.mode === 'stopwatch') {
    const labelEl = document.getElementById('sw-label');
    if (labelEl) _timerState.label = labelEl.value.trim();
    _timerState.startMs = Date.now() - (_timerState.elapsed * 1000);
    _timerState.running = true;
    _timerState.intervalId = setInterval(tickStopwatch, 100);
    speakTH('เริ่มจับเวลา');
  } else {
    // countdown
    if (_timerState.total === 0) { toast('กรุณาตั้งเวลาก่อน', 'warning'); return; }
    if (_timerState.remaining === 0) _timerState.remaining = _timerState.total;
    _timerState.running = true;
    _timerState.intervalId = setInterval(tickCountdown, 1000);
    speakTH('เริ่มนับถอยหลัง ' + _timerState.label);
  }
  renderRandom();
}

function pauseTimer() {
  _timerState.running = false;
  if (_timerState.intervalId) clearInterval(_timerState.intervalId);
  _timerState.intervalId = null;
  renderRandom();
}

function resetTimer() {
  if (_timerState.intervalId) clearInterval(_timerState.intervalId);
  if (_timerState.mode === 'countdown') {
    _timerState.remaining = _timerState.total;
  } else {
    _timerState.elapsed = 0;
  }
  _timerState.running = false;
  _timerState.intervalId = null;
  renderRandom();
}

function tickCountdown() {
  _timerState.remaining = Math.max(0, _timerState.remaining - 1);
  updateTimerDisplay();
  // Countdown alerts — fire regardless of current page (teacher benefit)
  if (_timerState.remaining === 60) { playBeep(600, 200); speakTH('เหลือเวลาอีก 1 นาที'); }
  else if (_timerState.remaining === 30) { playBeep(700, 200); speakTH('เหลือเวลาอีก 30 วินาที'); }
  else if (_timerState.remaining === 10) { speakTH('เหลือ 10 วินาที'); }
  else if (_timerState.remaining <= 5 && _timerState.remaining > 0) playBeep(800, 100);
  if (_timerState.remaining === 0) {
    clearInterval(_timerState.intervalId);
    _timerState.intervalId = null;
    _timerState.running = false;
    playFinalChime();
    speakTH('หมดเวลา' + (_timerState.label ? ' สำหรับ ' + _timerState.label : ''));
    toast('🔔 หมดเวลา' + (_timerState.label ? ': ' + _timerState.label : ''), 'warning', 5000);
    // Only re-render if user is still on this page (don't override other menus)
    if (APP.page === 'random' && _ctTab === 'timer') renderRandom();
  }
}

function tickStopwatch() {
  _timerState.elapsed = (Date.now() - _timerState.startMs) / 1000;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  const t = _timerState;
  el.textContent = t.mode === 'countdown' ? formatTimerSec(t.remaining) : formatTimerSec(t.elapsed);
}

        <div style="margin-top:30px;padding:20px;background:#fef3c7;border-radius:8px;text-align:left">

      </div>

function saveDpaProfile() {
  const f = document.getElementById('dpa-profile-form');
  APP.dpa.profile = {
    teacherName: f.teacherName.value, position: f.position.value,
    academicRank: f.academicRank.value, subject: f.subject.value,
    yearFrom: f.yearFrom.value, yearTo: f.yearTo.value
  };
  saveData();
  toast('บันทึกข้อมูลครูแล้ว', 'success');
}

function setDpaIndicator(stdKey, indKey, field, value) {
  if (!APP.dpa.standards[stdKey]) APP.dpa.standards[stdKey] = {};
  if (!APP.dpa.standards[stdKey][indKey]) APP.dpa.standards[stdKey][indKey] = {};
  APP.dpa.standards[stdKey][indKey][field] = value;
  saveData();
}

function saveDpaChallenge() {
  const f = document.getElementById('dpa-challenge-form');
  APP.dpa.challenge = {
    topic: f.topic.value, problem: f.problem.value, goal: f.goal.value,
    activities: f.activities.value, indicators: f.indicators.value,
    expectedOutput: f.expectedOutput.value
  };
  saveData();
  toast('บันทึกประเด็นท้าทายแล้ว', 'success');
}

function saveDpaPortfolio() {
  const f = document.getElementById('dpa-pf');
  APP.dpa.portfolio.push({

    date: f.date.value, note: f.note.value
  });
  saveData();
  closeModal();
  toast('เพิ่มผลงานแล้ว', 'success');
  renderDPA();
}

function deleteDpaPortfolio(idx) {
  confirmDialog('ลบผลงานนี้?', () => {

   📚 เมนู 27: คลังสื่อ/ข้อสอบ/ใบงาน
═══════════════════════════════════════════════════════════════ */
let _libFilter = {group:'', level:'', type:'', search:''};

function renderLibrary() {
  const types = {
    exam:'📝 ข้อสอบ', worksheet:'📄 ใบงาน', plan:'📋 แผนการสอน',
    media:'🎬 สื่อการสอน', rubric:'⚖️ Rubric', book:'📖 หนังสือ',
    other:'📌 อื่นๆ'
  };
  
  let items = [...APP.libraryItems];
  if (_libFilter.group) items = items.filter(i => i.group === _libFilter.group);
  if (_libFilter.level) items = items.filter(i => (i.levels||[]).includes(_libFilter.level));
  if (_libFilter.type) items = items.filter(i => i.type === _libFilter.type);
  if (_libFilter.search) {
    const q = _libFilter.search.toLowerCase();
    items = items.filter(i => (i.name||'').toLowerCase().includes(q) || (i.description||'').toLowerCase().includes(q));
  }
  
  const stats = {};
  SUBJECT_GROUPS.forEach(g => stats[g.key] = APP.libraryItems.filter(i => i.group === g.key).length);
  
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">📚 คลังสื่อการสอน / ข้อสอบ / ใบงาน</div>
          <div class="text-sm text-muted">รวม ${APP.libraryItems.length} รายการ · 8 กลุ่มสาระ · ม.1-6</div>
        </div>
        <button class="btn" onclick="editLibraryItem()">➕ เพิ่มรายการ</button>
      </div>
      
      <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:16px">
        ${SUBJECT_GROUPS.map(g => `
          <div style="padding:8px;background:${g.color}15;border:2px solid ${_libFilter.group===g.key?g.color:'transparent'};border-radius:6px;text-align:center;cursor:pointer" onclick="_libFilter.group=_libFilter.group==='${g.key}'?'':'${g.key}';renderLibrary()">
            <div style="font-size:20px">${g.icon}</div>
            <div style="font-size:10px;color:${g.color}">${g.name.substring(0,8)}</div>
            <div style="font-weight:bold;color:${g.color}">${stats[g.key]}</div>
          </div>
        `).join('')}
      </div>
      
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select class="form-select" style="width:auto" onchange="_libFilter.level=this.value;renderLibrary()">
          <option value="">📚 ทุกระดับ</option>
          ${LEVELS.map(l => `<option ${_libFilter.level===l.key?'selected':''}>${l.key}</option>`).join('')}
        </select>
        <select class="form-select" style="width:auto" onchange="_libFilter.type=this.value;renderLibrary()">
          <option value="">📋 ทุกประเภท</option>
          ${Object.entries(types).map(([k,v])=>`<option value="${k}" ${_libFilter.type===k?'selected':''}>${v}</option>`).join('')}
        </select>
        <input class="form-input" style="flex:1" placeholder="🔍 ค้นหา..." value="${_libFilter.search}" onchange="_libFilter.search=this.value;renderLibrary()">
        ${(_libFilter.group||_libFilter.level||_libFilter.type||_libFilter.search)?'<button class="btn btn-sm btn-secondary" onclick="_libFilter={group:\'\',level:\'\',type:\'\',search:\'\'};renderLibrary()">❌ ล้างตัวกรอง</button>':''}
      </div>
      
      ${items.length === 0 ? emptyState('ยังไม่มีรายการในคลัง','เพิ่มรายการแรก',()=>editLibraryItem()) : `
        <div class="table-wrap">
          <table class="data">
            <thead><tr>
              <th style="width:50px">#</th>
              <th style="width:110px">กลุ่มสาระ</th>
              <th style="width:90px">ประเภท</th>
              <th style="text-align:left">ชื่อ/รายละเอียด</th>
              <th style="width:100px">ระดับ</th>
              <th style="width:100px">แท็ก</th>
              <th style="width:90px">จัดการ</th>
            </tr></thead>
            <tbody>
              ${items.map((it, idx) => {
                const g = SUBJECT_GROUPS.find(gg => gg.key === it.group);
                return `<tr>
                  <td class="text-center">${idx+1}</td>
                  <td><span class="badge" style="background:${g?.color||'#64748b'}20;color:${g?.color||'#64748b'}">${g?.icon||''} ${g?.name.substring(0,8)||'—'}</span></td>
                  <td class="text-sm">${types[it.type]||it.type||'—'}</td>
                  <td>
                    <b>${it.name||'—'}</b>
                    ${it.description?`<div class="text-sm text-muted">${it.description.substring(0,80)}${it.description.length>80?'...':''}</div>`:''}
                  </td>
                  <td class="text-center text-sm">${(it.levels||[]).join(', ')||'—'}</td>
                  <td class="text-xs">${(it.tags||[]).map(t => `<span class="chip">${t}</span>`).join(' ')||'—'}</td>

function editLibraryItem(id) {
  const types = {
    exam:'📝 ข้อสอบ', worksheet:'📄 ใบงาน', plan:'📋 แผนการสอน',
    media:'🎬 สื่อการสอน', rubric:'⚖️ Rubric', book:'📖 หนังสือ',
    other:'📌 อื่นๆ'
  };
  const it = id ? APP.libraryItems.find(x => x.id === id) : {
    id:uid(), group:'', type:'exam', name:'', description:'', levels:[], tags:[]
  };
  const isNew = !id;
  
  showModal(isNew?'➕ เพิ่มรายการ':'✏️ แก้ไข', `
    <form id="lib-form" onsubmit="event.preventDefault();saveLibraryItem('${it.id}',${isNew})">
      <div class="form-group">
        <label class="form-label">ชื่อรายการ <span class="req">*</span></label>
        <input name="name" class="form-input" required value="${it.name||''}" placeholder="เช่น ข้อสอบกลางภาค คณิตศาสตร์ ม.3">
      </div>
      <div class="grid grid-2">
        <div class="form-group">
          <label class="form-label">กลุ่มสาระ <span class="req">*</span></label>
          <select name="group" class="form-select" required>
            <option value="">— เลือก —</option>
            ${SUBJECT_GROUPS.map(g => `<option value="${g.key}" ${it.group===g.key?'selected':''}>${g.icon} ${g.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">ประเภท</label>
          <select name="type" class="form-select">
            ${Object.entries(types).map(([k,v]) => `<option value="${k}" ${it.type===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ระดับชั้น (เลือกได้หลายระดับ)</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${LEVELS.map(l => {
            const checked = (it.levels||[]).includes(l.key);
            return `<label style="display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:${checked?l.color+'20':'#f3f4f6'};border:2px solid ${checked?l.color:'#e5e7eb'};border-radius:6px;cursor:pointer">
              <input type="checkbox" name="levels" value="${l.key}" ${checked?'checked':''}> ${l.key}
            </label>`;
          }).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">รายละเอียด</label>
        <textarea name="description" class="form-input" rows="3">${it.description||''}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">แท็ก (คั่นด้วย ,)</label>
        <input name="tags" class="form-input" value="${(it.tags||[]).join(', ')}" placeholder="เช่น ปลายภาค, บทที่ 3, O-NET">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
        <button type="submit" class="btn">💾 บันทึก</button>
      </div>
    </form>
  `);
}

function saveLibraryItem(id, isNew) {
  const f = document.getElementById('lib-form');
  const levels = [...f.querySelectorAll('input[name="levels"]:checked')].map(c => c.value);
  const tags = f.tags.value.split(',').map(s => s.trim()).filter(Boolean);
  const data = {
    id, name: f.name.value, group: f.group.value, type: f.type.value,
    description: f.description.value, levels, tags
  };
  if (isNew) APP.libraryItems.push(data);
  else {
    const idx = APP.libraryItems.findIndex(x => x.id === id);
    if (idx >= 0) APP.libraryItems[idx] = data;
  }
  saveData();
  closeModal();
  toast(isNew?'เพิ่มรายการแล้ว':'แก้ไขแล้ว', 'success');
  renderLibrary();
}

function deleteLibraryItem(id) {
  confirmDialog('ลบรายการนี้?', () => {
    APP.libraryItems = APP.libraryItems.filter(x => x.id !== id);
    saveData();
    renderLibrary();
  });
}

function exportAllData() {
  const data = JSON.stringify(APP, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'teenpro_backup_' + todayKey() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Export เรียบร้อย', 'success');
}

function importAllData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      confirmDialog('Import จะเขียนทับข้อมูลเดิมทั้งหมด ยืนยัน?', () => {
        Object.assign(APP, data);
        saveData();
        toast('Import สำเร็จ', 'success');
        navigate('dashboard');
      });
    } catch (err) {
      toast('ไฟล์ไม่ถูกต้อง: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

  // ═══ 4. Attendance (30 วันย้อนหลัง — profile-driven) ═══
  APP.attendance = {};
  for (let d = 0; d < 30; d++) {

      else if (r < p.abs * 0.85)    status = 'L';  // ลากิจ
      else if (r < p.abs + 0.03)    status = 'T';  // สาย

  }
  
  // ═══ 5. Homeroom (8 บันทึก) ═══
  const homeroomTopics = [
    {t:'ความปลอดภัยในโรงเรียน', a:'แจ้งและกำชับการข้ามถนน ดูแลของมีค่า', c:'ย้ำเรื่องการล็อกตู้ พกเงินแต่พอควร'},

    {t:'สุขอนามัย · ป้องกันโรค', a:'ตรวจอุณหภูมิ · สอนล้างมือ · ตรวจเล็บ', c:'ล้างมือก่อนกินข้าว · รักษาระยะห่าง'},
    {t:'วินัย เคารพกติกา', a:'ทบทวนระเบียบโรงเรียน · ตักเตือนผู้ไม่ปฏิบัติ', c:'แต่งกายให้ถูกระเบียบ · มาเรียนตรงเวลา'},
    {t:'เตรียมตัวสู่ ม.ปลาย', a:'แนะแนว · แผนการเรียนสาย · TCAS เบื้องต้น', c:'เริ่มคิดเส้นทางอาชีพและสาย'},
    {t:'กิจกรรมกีฬาสี', a:'แบ่งทีม · ซ้อม · เตรียมตัวแข่ง', c:'ห้องเราอยู่สีแดง ฝึกซ้อม 3 วัน/สัปดาห์'},

  // ═══ 6. Scores (term 1 เต็ม + term 2 แค่ก่อนกลาง — สมจริง) ═══
  APP.scores = {1: {}, 2: {}};
  APP.subjects.forEach(sub => {
    APP.scores[1][sub.id] = {};
    APP.scores[2][sub.id] = {};
    P.forEach((p, i) => {
      // Term 1: profile-driven total, distribute into 4 parts
      const base = gpaxToBase(p.gpax);
      const subjBias = sub.group === 'math' && (p.prof === 'support-academic' || p.prof === 'risk-game') ? -8 
                     : sub.group === 'science' && p.prof === 'science' ? +6
                     : sub.group === 'art' && p.prof === 'art' ? +8
                     : sub.group === 'health' && p.prof === 'sport' ? +8
                     : sub.group === 'english' && p.prof === 'top' ? +3
                     : 0;
      const total = Math.max(10, Math.min(95, base + subjBias + rand(-4, 4)));
      APP.scores[1][sub.id]['stu_'+i] = {
        k1:  Math.min(30, Math.max(0, Math.round(total * 0.30) + rand(-2,2))),
        mid: Math.min(20, Math.max(0, Math.round(total * 0.20) + rand(-2,2))),
        k2:  Math.min(30, Math.max(0, Math.round(total * 0.30) + rand(-2,2))),
        fin: Math.min(20, Math.max(0, Math.round(total * 0.20) + rand(-2,2))),
      };
      // Term 2: only k1 filled
      APP.scores[2][sub.id]['stu_'+i] = {
        k1:  Math.min(30, Math.max(0, Math.round(total * 0.30 * 0.95) + rand(-2,2))),

  // ═══ 7. ปพ.6 (คุณลักษณะ/สมรรถนะ/อ่านคิดวิเคราะห์) ═══
  APP.pob6 = {1: {}};

    CHARACTER_TRAITS.forEach((t, idx) => {

      let v = baseline + hit;
      if (p.prof === 'top') v = 3;
      if (t.key === 'discipline' && hit < 0) v = 1;
      if (t.key === 'commit' && p.prof.includes('risk')) v = 1;

    rec.analytical = Math.max(0, baseline + (p.prof === 'risk-game' ? -1 : 0));

    for (let q = 1; q <= 25; q++) {
      const r = Math.random();
      self[q] = r < highProb ? 2 : r < highProb + 0.25 ? 1 : 0;

      if (p.gpax >= 2.5) return 2;

      good:  {moral: mk('moral'), kindness: mk('kindness'), responsibility: mk('responsibility')},

      if (p.prof === 'behavior' && cat === 'behavior') return 'risk';
      if (p.prof === 'mental' && cat === 'emotion') return 'problem';
      if (p.prof === 'family' && cat === 'emotion') return 'risk';
      if (p.prof === 'economy' && cat === 'economy') return 'problem';

  ];
  riskDetails.forEach(r => {

  APP.advisorReport = {

// SDQ score calculator (used in dashboard)
function calcSDQScores(rec) {
  if (!rec) return null;
  const scores = { emotional:0, conduct:0, hyperactive:0, peer:0, prosocial:0 };
  SDQ_ITEMS.forEach(it => {
    const raw = Number(rec[it.no]);
    if (isNaN(raw)) return;
    const v = it.reverse ? 2 - raw : raw;
    scores[it.domain] += v;
  });
  const classify = (domain, score) => {
    const cut = SDQ_CUTOFF[domain];
    if (score >= cut.normal[0] && score <= cut.normal[1]) return 'normal';
    if (score >= cut.borderline[0] && score <= cut.borderline[1]) return 'borderline';
    return 'abnormal';
  };
  const totalDiff = scores.emotional + scores.conduct + scores.hyperactive + scores.peer;
  return {
    ...scores,
    totalDiff,
    emoClass: classify('emotional', scores.emotional),
    condClass: classify('conduct', scores.conduct),
    hyperClass: classify('hyperactive', scores.hyperactive),
    peerClass: classify('peer', scores.peer),
    prosocClass: classify('prosocial', scores.prosocial),
    totalClass: classify('total', totalDiff),
  };
}
